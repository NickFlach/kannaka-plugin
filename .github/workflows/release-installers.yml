name: release-installers
# Builds native installers on each release tag (v*) and attaches them as assets.
# Each wraps the shared install engine (install/install.{sh,ps1}); the engine
# does the per-user work (binary + Claude Code plugin + statusline + swarm MCP).
# NOTE: assets are UNSIGNED until signing certs are wired (Authenticode for .msi,
# Apple Developer ID for .pkg) — until then OS SmartScreen/Gatekeeper will warn.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb
        run: bash install/linux/build-deb.sh "${GITHUB_REF_NAME#v}"
      - uses: actions/upload-artifact@v4
        with: { name: kannaka-setup-linux-deb, path: kannaka-setup-linux.deb }
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with: { files: kannaka-setup-linux.deb }

  macos-pkg:
    runs-on: macos-latest
    # HAS_SIGN flips to 'true' automatically once MACOS_CERT_P12_BASE64 is set
    # in repo secrets — then the pkg is signed + notarized. See install/SIGNING.md.
    env:
      HAS_SIGN: ${{ secrets.MACOS_CERT_P12_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Build .pkg
        run: bash install/macos/build-pkg.sh "${GITHUB_REF_NAME#v}"
      - name: Sign + notarize .pkg (only when cert secret is present)
        if: env.HAS_SIGN == 'true'
        env:
          CERT_B64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
          SIGN_ID: ${{ secrets.MACOS_SIGN_IDENTITY }}
          AC_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          AC_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          AC_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 -d > cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PW" -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          productsign --sign "$SIGN_ID" kannaka-setup-macos.pkg signed.pkg && mv signed.pkg kannaka-setup-macos.pkg
          xcrun notarytool submit kannaka-setup-macos.pkg --apple-id "$AC_APPLE_ID" --team-id "$AC_TEAM_ID" --password "$AC_PASSWORD" --wait
          xcrun stapler staple kannaka-setup-macos.pkg
          rm -f cert.p12
      - uses: actions/upload-artifact@v4
        with: { name: kannaka-setup-macos-pkg, path: kannaka-setup-macos.pkg }
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with: { files: kannaka-setup-macos.pkg }

  windows-msi:
    runs-on: windows-latest
    # HAS_SIGN flips to 'true' automatically once WINDOWS_CERT_PFX_BASE64 is set
    # in repo secrets — then the msi is Authenticode-signed. See install/SIGNING.md.
    env:
      HAS_SIGN: ${{ secrets.WINDOWS_CERT_PFX_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install WiX (pin v5 — pre-OSMF licensing gate)
        run: dotnet tool install --global wix --version 5.0.2
      - name: Build .msi
        shell: pwsh
        run: wix build install/windows/kannaka.wxs -o kannaka-setup-windows.msi
      - name: Sign .msi (Authenticode, only when cert secret is present)
        if: env.HAS_SIGN == 'true'
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          PFX_PW: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          [IO.File]::WriteAllBytes("$PWD\cert.pfx", [Convert]::FromBase64String($env:PFX_B64))
          $st = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                Where-Object FullName -like "*x64*" | Select-Object -ExpandProperty FullName -First 1
          & $st sign /fd SHA256 /f cert.pfx /p $env:PFX_PW /tr http://timestamp.digicert.com /td SHA256 kannaka-setup-windows.msi
          Remove-Item cert.pfx
      - uses: actions/upload-artifact@v4
        with: { name: kannaka-setup-windows-msi, path: kannaka-setup-windows.msi }
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with: { files: kannaka-setup-windows.msi }

  # ───────────────────────────────────────────────────────────────────────────
  # Supply-chain trust for the installer artifacts — NO paid certs required:
  #   • <artifact>.sha256 — per-file checksum sidecar (matches the engine-binary
  #     convention install.sh already verifies against).
  #   • SHA256SUMS.txt     — one manifest covering all three installers.
  #   • cosign keyless     — a Sigstore signature (.sig) + cert (.pem) per artifact
  #     AND for the manifest; identity = THIS workflow via GitHub OIDC, recorded
  #     in the public Rekor transparency log. Verify without a shared key (SIGNING.md).
  # Runs unconditionally and free. Signing is best-effort: a Sigstore/Rekor outage
  # emits a loud warning but NEVER blocks the release (checksums still ship). The
  # Authenticode/Apple notarization above is the separate, cert-gated path that
  # additionally silences OS SmartScreen/Gatekeeper. On a non-tag run
  # (workflow_dispatch) everything is built + signed to exercise the path, but
  # nothing is attached to a release.
  # ───────────────────────────────────────────────────────────────────────────
  trust:
    needs: [linux-deb, macos-pkg, windows-msi]
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach checksums + signatures to the release
      id-token: write # OIDC identity for cosign keyless signing
    steps:
      - name: Gather installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums (per-file .sha256 + SHA256SUMS.txt manifest)
        working-directory: dist
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(kannaka-setup-*.deb kannaka-setup-*.pkg kannaka-setup-*.msi)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no installer artifacts found in dist/" >&2
            exit 1
          fi
          : > SHA256SUMS.txt
          for f in "${files[@]}"; do
            # one line "<hash>  <file>" -> appended to the manifest and its own sidecar
            sha256sum "$f" | tee -a SHA256SUMS.txt > "$f.sha256"
          done
          echo "---- SHA256SUMS.txt ----"
          cat SHA256SUMS.txt
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign artifacts + manifest (keyless / Sigstore)
        id: sign
        continue-on-error: true # a Sigstore outage must never block a release
        working-directory: dist
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in kannaka-setup-*.deb kannaka-setup-*.pkg kannaka-setup-*.msi SHA256SUMS.txt; do
            [ -e "$f" ] || continue
            echo "signing $f"
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done
      - name: Warn loudly if signing did not complete
        if: steps.sign.outcome == 'failure'
        run: |
          echo "::warning title=Sigstore signing failed::cosign sign-blob did not complete — the installers still ship with SHA256 checksums but WITHOUT Sigstore signatures this release. Most likely a Sigstore/Rekor/Fulcio outage; re-run this job once Sigstore is healthy. The release was NOT blocked."
      - name: Attach trust assets to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SHA256SUMS.txt
            dist/*.sha256
            dist/*.sig
            dist/*.pem
